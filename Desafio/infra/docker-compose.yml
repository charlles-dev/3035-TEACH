#      GF_AUTH_ANONYMOUS_ORG_ROLE: Viewer
#    volumes:
#      - teachgram-grafana-data:/var/lib/grafana

  postgres-exporter:
    image: prometheuscommunity/postgres-exporter
    container_name: teachgram-postgres-exporter
    environment:
      DATA_SOURCE_NAME: "postgresql://postgres.irkuvpvxxvfakcnwbqka:raCDrzgWEvfAoFvb@aws-0-sa-east-1.pooler.supabase.com:5432/postgres?sslmode=require"

  redis-exporter:
    image: oliver006/redis_exporter
    container_name: teachgram-redis-exporter
    environment:
      REDIS_ADDR: "rediss://deep-goshawk-123695.upstash.io:6379"
      REDIS_PASSWORD: "gQAAAAAAAeMvAAIgcDExZTY3MGY3MTFlM2Y0NjQwYWEzMjVmMjkxNDcyZTU0Yw"

  blackbox-exporter:
    image: prom/blackbox-exporter
    container_name: teachgram-blackbox-exporter
    ports:
      - "9115:9115"

