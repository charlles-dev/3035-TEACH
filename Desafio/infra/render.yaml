services:
  - type: web
    name: teachgram-api
    runtime: docker
    plan: free
    rootDir: backend
    healthCheckPath: /actuator/health
    envVars:
      - key: SPRING_PROFILES_ACTIVE
        value: demo
      - key: DATABASE_URL
        sync: false
      - key: DATABASE_USERNAME
        sync: false
      - key: DATABASE_PASSWORD
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: SECURE_COOKIES
        value: true
      - key: CORS_ALLOWED_ORIGINS
        sync: false
      - key: RATE_LIMIT_ENABLED
        value: true
      - key: REDIS_ENABLED
        value: true
      - key: REDIS_URL
        sync: false
      - key: REDIS_SSL_ENABLED
        value: true
      - key: AI_ENABLED
        value: true
      - key: AI_PROVIDER
        value: groq
      - key: AI_FALLBACK_ENABLED
        value: true
      - key: GROQ_API_KEY
        sync: false
      - key: GROQ_BASE_URL
        value: https://api.groq.com/openai/v1
      - key: GROQ_TEXT_MODEL
        value: groq/compound
      - key: GROQ_FAST_MODEL
        value: groq/compound-mini
      - key: GROQ_MODEL_VERSION
        sync: false
      - key: SUPABASE_STORAGE_ENABLED
        value: true
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: SUPABASE_PUBLIC_BUCKET
        value: teachgram-media
