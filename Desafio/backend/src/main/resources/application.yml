spring:
  application:
    name: teachgram-pro-api
  profiles:
    default: local
  jpa:
    open-in-view: false
  jackson:
    default-property-inclusion: non_null

server:
  port: ${PORT:${SERVER_PORT:8081}}
  servlet:
    context-path: /
    session:
      cookie:
        same-site: lax

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true

springdoc:
  swagger-ui:
    path: /swagger-ui/index.html

app:
  api-base-path: /api/v1
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173}
  security:
    jwt-secret: ${JWT_SECRET:local-dev-secret-change-me-local-dev-secret-change-me}
    access-token-ttl: ${JWT_ACCESS_TOKEN_TTL:PT15M}
    refresh-token-ttl: ${JWT_REFRESH_TOKEN_TTL:P30D}
    refresh-cookie-name: teachgram_refresh
    secure-cookies: ${SECURE_COOKIES:false}
  rate-limit:
    enabled: ${RATE_LIMIT_ENABLED:true}
    login-per-minute: ${RATE_LIMIT_LOGIN_PER_MINUTE:5}
    ai-per-hour: ${RATE_LIMIT_AI_PER_HOUR:20}
  ai:
    enabled: ${AI_ENABLED:false}
    provider: ${AI_PROVIDER:groq}
    fallback-enabled: ${AI_FALLBACK_ENABLED:true}
    timeout-ms: ${AI_TIMEOUT_MS:8000}
    groq:
      api-key: ${GROQ_API_KEY:}
      base-url: ${GROQ_BASE_URL:https://api.groq.com/openai/v1}
      text-model: ${GROQ_TEXT_MODEL:groq/compound}
      fast-model: ${GROQ_FAST_MODEL:groq/compound-mini}
      model-version: ${GROQ_MODEL_VERSION:}
  media:
    supabase-enabled: ${SUPABASE_STORAGE_ENABLED:false}
    supabase-url: ${SUPABASE_URL:}
    supabase-bucket: ${SUPABASE_PUBLIC_BUCKET:teachgram-media}
