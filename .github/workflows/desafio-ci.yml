name: desafio-devconnect-ci

on:
  push:
    paths:
      - "desafio/**"
      - ".github/workflows/desafio-ci.yml"
  pull_request:
    paths:
      - "desafio/**"
      - ".github/workflows/desafio-ci.yml"

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: desafio/backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
      - run: chmod +x mvnw
      - run: ./mvnw -q test
      - run: ./mvnw -q -DskipTests package

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: desafio/frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: desafio/frontend/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm run test
      - run: npm run build
